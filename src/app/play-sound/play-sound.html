<div
  class="flashcard-container"
  (touchstart)="onTouchStart($event)"
  (touchmove)="onTouchMove($event)"
  (touchend)="onTouchEnd()"
>
  <div
    class="flashcard"
    [style.transform]="transformStyle"
    [class.touching]="isTouching"
    [class.paused]="currentPlaying === currentAnimal.id && audios[currentAnimal.id]?.paused"
    [class.playing]="currentPlaying === currentAnimal.id && !audios[currentAnimal.id]?.paused"
  >
    <img [src]="currentAnimal.image" [alt]="currentAnimal.name" class="animal-img" />

    <div class="animal-name">
      {{ currentAnimal.name }}
    </div>
  </div>
</div>

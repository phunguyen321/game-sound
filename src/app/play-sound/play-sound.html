<div
  class="flashcard-container"
  (touchstart)="onTouchStart($event)"
  (touchmove)="onTouchMove($event)"
  (touchend)="onTouchEnd()"
  (mousedown)="onMouseDown($event)"
  (mousemove)="onMouseMove($event)"
  (mouseup)="onMouseUp()"
  (mouseleave)="onMouseLeave()"
>
  <div
    class="flashcard"
    [style.transform]="transformStyle()"
    [class.touching]="isTouching()"
    [class.paused]="audioState() === 'paused'"
    [class.playing]="audioState() === 'playing'"
  >
    <img [src]="currentAnimal().image" [alt]="currentAnimal().name" class="animal-img" />

    <div class="animal-name">{{ currentAnimal().name }}</div>
  </div>
</div>
